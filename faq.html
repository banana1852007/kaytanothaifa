```html
<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>שאלות נפוצות | אני לא פיליפ</title>

    <meta name="description"
        content="שאלות נפוצות ומידע חשוב בנושא קייטנות ורישום">

    <link rel="stylesheet"
        href="styles.css">
</head>

<body>

    <!-- ==========================
         NAVBAR
    =========================== -->

    <header class="navbar">

        <div class="nav-content">

            <a href="index.html"
                class="brand">

                <img
                    src="https://freesvg.org/img/-elephant.png"
                    alt="לוגו">

                <span>אני לא פיליפ</span>

            </a>

            <a href="index.html"
                class="back-button"
                aria-label="חזרה לעמוד הבית">

                ← חזור

            </a>

        </div>

    </header>

    <!-- ==========================
         PAGE CONTENT
    =========================== -->

    <main id="pageContent">

        <!-- HERO -->

        <section class="hero">

            <h1 class="hero-title reveal">
                שאלות נפוצות
            </h1>

            <p class="hero-subtitle reveal">
                תשובות מהירות לשאלות הנפוצות ביותר.
                לחצו על כל נושא כדי לקבל מידע מלא.
            </p>

        </section>

        <!-- FAQ GRID -->

        <section class="container">

            <div id="faqGrid"
                class="faq-grid">

                <!--
                Cards are generated
                automatically from script.js
                -->

            </div>

        </section>

        <!-- SPACER -->

        <div style="height:80px"></div>

    </main>

    <!-- ==========================
         MODAL
    =========================== -->

    <div
        id="modalOverlay"
        class="modal-overlay"
        aria-hidden="true">

        <div
            class="modal"
            role="dialog"
            aria-modal="true"
            aria-labelledby="modalTitle">

            <h2
                id="modalTitle"
                class="modal-title">
            </h2>

            <div
                id="modalContent"
                class="modal-content">
            </div>

            <button
                id="closeModal"
                class="modal-close"
                aria-label="סגור חלון">

                סגור

            </button>

        </div>

    </div>

    <!-- ==========================
         FOOTER
    =========================== -->

    <footer class="footer">

        © 2026 אני לא פיליפ

    </footer>

    <script src="script.js"></script>

</body>

</html>
```
